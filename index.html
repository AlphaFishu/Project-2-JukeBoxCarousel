<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Vintage Jukebox Carousel</title>
    <!-- Modern Font for Spotify-like aesthetic -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=3">
</head>

<body>
    <!-- The fullscreen container for the jukebox scene -->
    <div class="sticky-container">
        <div class="title-overlay">
            <h1>Jukebox</h1>
            <p>Scroll to browse</p>
        </div>

        <div class="scene">
            <!-- The 3D rotating carousel -->
            <div class="carousel" id="carousel">
                <!-- Cards will be injected by JavaScript -->
            </div>
        </div>
    </div>

    <script src="script.js?v=3"></script>
</body>

</html>
