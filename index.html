<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" id="themeColorMeta" content="#121212">
    <title>3D Vintage Jukebox Carousel</title>
    <!-- Outfit for UI, Bebas Neue for the giant stage marquee -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css?v=27">
</head>

<body>
    <!-- Film grain overlay for a subtle analog texture across the whole app -->
    <div class="grain-overlay"></div>

    <!-- SVG filter definitions for Liquid Glass refraction (populated dynamically by script.js) -->
    <svg class="glass-defs" aria-hidden="true" focusable="false"><defs id="liquidGlassDefs"></defs></svg>

    <!-- Immersive Frosted Blur Background for Rolling Album mode -->
    <div class="ambient-bg-blurred" id="ambientBgBlurred"></div>

    <!-- Spotify Gradient Background for Cover Flow mode -->
    <div class="coverflow-bg-gradient" id="coverflowBgGradient">
        <div class="gradient-layer active-init" id="gradLayer1"></div>
        <div class="gradient-layer" id="gradLayer2"></div>
    </div>

    <!-- Aurora stage lighting: drifting blobs tinted by the active album's palette -->
    <div class="aurora-bg" aria-hidden="true">
        <div class="aurora-blob blob-1"></div>
        <div class="aurora-blob blob-2"></div>
        <div class="aurora-blob blob-3"></div>
    </div>

    <!-- Giant kinetic marquee: the artist's name projected behind the stage -->
    <div class="backdrop-marquee" id="backdropMarquee" aria-hidden="true">
        <span id="marqueeText"></span>
    </div>

    <!-- Cinematic corner vignette -->
    <div class="vignette-overlay" aria-hidden="true"></div>
    <div class="mode-selector">
        <div class="mode-slider"></div>
        <button class="mode-btn" data-mode="cylinder">
            <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="1"/><path d="m19 5-7 7"/></svg> Jukebox
        </button>
        <button class="mode-btn active" data-mode="coverflow">
            <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="1.5"/><path d="M12 2a10 10 0 0 1 10 10"/></svg> Vinyl Records
        </button>
        <button class="mode-btn" data-mode="depth">
            <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 3-8 4 8 4 8-4-8-4z"/><path d="m4 12 8 4 8-4"/><path d="m4 17 8 4 8-4"/></svg> Rolling Album
        </button>
        <button class="mode-btn" data-mode="shuffle">
            <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m18 14 4 4-4 4"/><path d="m18 2 4 4-4 4"/><path d="M2 18h1.973a4 4 0 0 0 3.3-1.7l5.454-8.6a4 4 0 0 1 3.3-1.7H22"/><path d="M2 6h1.972a4 4 0 0 1 3.6 2.2"/><path d="M22 18h-6.041a4 4 0 0 1-3.3-1.8l-.359-.45"/></svg> Shuffle
        </button>
        <button class="mode-btn" data-mode="helix">
            <svg class="btn-icon-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H3"/><path d="M18 8H6"/><path d="M19 12H9"/><path d="M16 16h-6"/><path d="M11 20H9"/></svg> Helix
        </button>
    </div>

    <!-- Now Playing dock: liquid glass console with controls, counter, and position bar -->
    <div class="now-playing-dock" id="nowPlayingDock">
        <button class="dock-btn" id="dockPrev" aria-label="Previous album">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </button>
        <div class="dock-info">
            <div class="dock-title" id="dockTitle">—</div>
            <div class="dock-artist" id="dockArtist">—</div>
            <div class="dock-steps" id="dockSteps"></div>
        </div>
        <button class="dock-btn" id="dockNext" aria-label="Next album">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
        </button>
    </div>

    <!-- The fullscreen container for the jukebox scene -->
    <div class="sticky-container">
        <div class="title-overlay">
            <p>Scroll or swipe to explore</p>
        </div>

        <div class="scene">
            <!-- The 3D rotating carousel -->
            <div class="carousel" id="carousel">
                <!-- Cards will be injected by JavaScript -->
            </div>
        </div>

        <!-- Details Panel (Song List & Lyrics) - visible only in Depth Cascade mode -->
        <div class="details-panel" id="detailsPanel">
            <!-- Dynamically populated by JavaScript -->
        </div>
    </div>

    <script src="script.js?v=27"></script>
</body>

</html>
